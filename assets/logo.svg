<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 96" role="img" aria-label="ProConnect">
  <!-- Logomark -->
  <g fill="none" stroke="#1E4BA8" stroke-width="10" stroke-linecap="round">
    <!-- outer ring with gap -->
    <circle cx="50" cy="48" r="38" stroke-dasharray="210 50" transform="rotate(-30 50 48)"/>
    <!-- inner P bowl -->
    <path d="M38 28 h14 a12 12 0 0 1 0 24 h-14 v20" />
    <!-- tail stroke extending out -->
    <path d="M70 70 l20 20" stroke-width="10"/>
  </g>
  <!-- dots -->
  <circle cx="50" cy="40" r="4" fill="#1E4BA8"/>
  <circle cx="90" cy="48" r="4" fill="#1E4BA8"/>

  <!-- Wordmark -->
  <text x="128" y="68" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="64" font-weight="700" fill="#1E4BA8" letter-spacing="-1">proconnect</text>
</svg>
