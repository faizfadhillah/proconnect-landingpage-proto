name: PRODUCTION DEPLOYMENT 🚀

on:
  workflow_dispatch:
    inputs:
      forceVersion:
        description: "Force version (ex: v1.0.0)"
        required: true

jobs:
  build:
    name: Create Git Tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ github.event.inputs.forceVersion }}
          tag_prefix: ""

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: "Release for ProConnect-API"

    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}

  deploy:
    name: Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.PROCONNECT_DOCKER_USERNAME }}
          password: ${{ secrets.PROCONNECT_DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./data/Dockerfile
          push: true
          tags: |
            ${{ secrets.PROCONNECT_DOCKER_USERNAME }}/proconnect-deploy:latest
            ${{ secrets.PROCONNECT_DOCKER_USERNAME }}/proconnect-deploy:${{ needs.build.outputs.new_tag }}

  publish-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Deploy via SSH (with key)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROCONNECT_IP_HOST }}
          username: ${{ secrets.PROCONNECT_USER_HOST }}
          key: ${{ secrets.PROCONNECT_SSH_KEY }}
          port: ${{ secrets.PROCONNECT_HOST_PORT }}
          script: |
            cd /apps/ProConnect-API
            # Pull latest code (docker-compose.yml, monitoring configs, etc.)
            echo "Pulling latest code from repository..."
            git fetch origin production
            git reset --hard origin/production
            # Pull latest backend image
            echo "Pulling latest backend image..."
            docker compose pull proconnect_backend
            echo "Running database migration..."
            docker compose run --rm proconnect_backend npm run migration:run
            # Graceful restart strategy - Redis stays running
            echo "Stopping backend service..."
            docker compose stop proconnect_backend
            echo "Removing old backend container..."
            docker compose rm -f proconnect_backend
            echo "Starting backend service with new image..."
            docker compose up -d proconnect_backend
            # Verify services are running
            echo "Checking service status..."
            docker compose ps
            # Clean up unused images (but preserve running containers)
            docker image prune -f
            echo "Deployment completed successfully!"
