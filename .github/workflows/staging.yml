name: CI Deployment Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  build-staging-image:
    name: Build & Push Staging Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_STAGING_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_STAGING_PASSWORD }}

      - name: Build and push Docker image (staging)
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./data/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_STAGING_USERNAME }}/proconnect-deploy-stg:latest
            ${{ secrets.DOCKER_HUB_STAGING_USERNAME }}/proconnect-deploy-stg:${{ github.sha }}

      - name: Show local Docker disk usage (CI runner)
        run: |
          echo "== Docker disk usage on CI runner =="
          docker system df
          echo "== Staging image sizes on CI runner =="
          docker images "${{ secrets.DOCKER_HUB_STAGING_USERNAME }}/proconnect-deploy-stg" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-staging-image
    steps:
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /var/www/proconnect/ProConnect-API-STG
            if [ ! -f /var/secrets/proconnect/firebase-admin.json ]; then
              echo "ERROR: Firebase credential tidak ditemukan di /var/secrets/proconnect/firebase-admin.json"
              exit 1
            fi
            echo "== VPS disk usage BEFORE deploy =="
            df -h
            echo "== Docker disk usage BEFORE deploy =="
            docker system df || true
            git fetch origin
            git reset --hard origin/staging
            git pull --no-edit origin staging
            echo "Pulling latest staging image..."
            docker compose pull proconnect_backend
            echo "Running database migration in staging..."
            docker compose run --rm proconnect_backend npm run migration:run
            echo "Restarting backend service..."
            docker compose stop proconnect_backend
            docker compose rm -f proconnect_backend
            docker compose up -d proconnect_backend
            echo "Cleaning up unused Docker images and cache..."
            docker image prune -f
            docker builder prune -f || true
            echo "== VPS disk usage AFTER cleanup =="
            df -h
            echo "== Docker disk usage AFTER cleanup =="
            docker system df || true
            echo "Staging deployment completed."
