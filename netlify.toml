[build]
  publish = "."
  # Ignore the /cms Nuxt app — it deploys separately. Netlify will only publish the root HTML.
  ignore = "false"

# Stop Netlify from trying to auto-install /cms package.json
[build.environment]
  NETLIFY_SKIP_CMS_BUILD = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Do not serve /cms/* from Netlify — it's a separate app
[[redirects]]
  from = "/cms/*"
  to = "/"
  status = 404
