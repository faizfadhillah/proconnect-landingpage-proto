name: CI Development Main

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Staging Deployment Job
  deploy-main:
    name: Deploy to Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          printf "%s" "${{ secrets.CMS_ENV_FILE }}" > .env

      - name: Build on GitHub Actions
        run: npm run build-max

      - name: Prepare Staging Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /var/www/proconnect/ProConnect-CMS
            rm -rf .output

      - name: Upload Build Output
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          source: ".output/"
          target: "/var/www/proconnect/ProConnect-CMS"
          strip_components: 0

      - name: Reload PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /var/www/proconnect/ProConnect-CMS
            pm2 reload pro-cms
