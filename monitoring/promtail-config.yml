server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs - only proconnect_backend (no Loki/Promtail/Grafana/Redis)
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape proconnect_backend container
      - source_labels: [__meta_docker_container_name]
        regex: '/proconnect_backend'
        action: keep
      # Extract container name (remove leading slash)
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container_name
      # Extract image name
      - source_labels: [__meta_docker_image_name]
        target_label: image_name
      # Extract container ID
      - source_labels: [__meta_docker_container_id]
        target_label: container_id
      # Set log path to container's log file
      - source_labels: [__meta_docker_container_id]
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/*.log
      # Add compose project label if available
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      # Add compose service label if available
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      # Add container labels as additional labels
      - source_labels: [__meta_docker_container_label_org_label_schema_version]
        target_label: schema_version

  # File-based logs (for staging/PM2)
  - job_name: file-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: file-logs
          app: proconnect-api
          env: staging
          __path__: /var/app/logs/*.log
